<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنصة التفاعلية الشاملة - السبورة البيضاء</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            /* 1. تحويل الخلفية إلى الأبيض */
            background-color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 2. تعديل لوحة التحكم لتناسب الخلفية الفاتحة */
        .control-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(240, 240, 240, 0.9); padding: 10px 20px;
            border-radius: 15px; display: flex; gap: 15px; border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: #fff; color: #333; border: 2px solid #bbb;
            padding: 10px 20px; font-size: 16px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        button:hover { background-color: #f0f0f0; }
        button.active { background-color: #007bff; color: #fff; border-color: #007bff; }
        button.clear-btn { background-color: #dc3545; color: white; border-color: #dc3545; }
        button.clear-btn:hover { background-color: #c82333; }

        .canvas-container { position: relative; width: 100vw; height: 100vh; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #videoElement { display: none; }
        #canvas3D { z-index: 1; display: none; }
        #drawingCanvas { z-index: 2; }
        #handCanvas { z-index: 3; pointer-events: none; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="control-panel">
        <button id="btnDrawing" class="active">وضع الرسم</button>
        <button id="btn3D">وضع تفكيك المجسمات</button>
        <button id="btnClear" class="clear-btn">مسح المكتوب</button>
    </div>

    <video id="videoElement" autoplay playsinline></video>
    
    <div class="canvas-container">
        <canvas id="canvas3D"></canvas>
        <canvas id="drawingCanvas"></canvas>
        <canvas id="handCanvas"></canvas>
    </div>

    <script>
        let currentMode = 'drawing'; 
        let isDrawing = false;
        
        let smoothedX = 0; let smoothedY = 0; let lastX = 0; let lastY = 0;
        const smoothingFactor = 0.2;
        
        const btnDrawing = document.getElementById('btnDrawing');
        const btn3D = document.getElementById('btn3D');
        const btnClear = document.getElementById('btnClear');
        
        const drawingCanvas = document.getElementById('drawingCanvas');
        const canvas3D = document.getElementById('canvas3D');
        const handCanvas = document.getElementById('handCanvas');
        const drawCtx = drawingCanvas.getContext('2d');
        const handCtx = handCanvas.getContext('2d');

        function resizeCanvas() {
            drawingCanvas.width = window.innerWidth; drawingCanvas.height = window.innerHeight;
            handCanvas.width = window.innerWidth; handCanvas.height = window.innerHeight;
            
            // 3. تعديل القلم ليكون أسود وبدون إضاءة (Neon) ليبدو كقلم سبورة حقيقي
            drawCtx.strokeStyle = '#000000'; 
            drawCtx.lineWidth = 6;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.shadowBlur = 0; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        btnDrawing.addEventListener('click', () => {
            currentMode = 'drawing';
            btnDrawing.classList.add('active'); btn3D.classList.remove('active');
            drawingCanvas.style.display = 'block'; canvas3D.style.display = 'none';
        });

        btn3D.addEventListener('click', () => {
            currentMode = '3d';
            btn3D.classList.add('active'); btnDrawing.classList.remove('active');
            drawingCanvas.style.display = 'none'; canvas3D.style.display = 'block';
        });

        btnClear.addEventListener('click', () => { drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height); });

        // بيئة Three.js
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 5;
        const renderer = new THREE.WebGLRenderer({ canvas: canvas3D, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(1, 1, 2).normalize(); scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const parts = []; const colors = [0xff0000, 0x00ff00, 0x0000ff];
        for(let i=0; i<3; i++) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: colors[i] });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.x = (i - 1) * 1.5; scene.add(mesh); parts.push(mesh);
        }

        let heldObject = null; const raycaster = new THREE.Raycaster();

        function animate3D() {
            requestAnimationFrame(animate3D);
            parts.forEach(part => { if(part !== heldObject) { part.rotation.x += 0.01; part.rotation.y += 0.01; } });
            renderer.render(scene, camera3D);
        }
        animate3D();

        const videoElement = document.getElementById('videoElement');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        hands.onResults((results) => {
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const thumb = landmarks[4]; const index = landmarks[8];
                const distance = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                // 4. جعل هيكل اليد بألوان داكنة لتظهر بوضوح على الخلفية البيضاء
                const handColor = distance < 0.08 ? '#00aa00' : '#0000ff'; // أخضر غامق عند الكتابة، أزرق عند الرفع
                drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: handColor, lineWidth: 4});
                drawLandmarks(handCtx, landmarks, {color: '#333333', lineWidth: 1, radius: 2}); // مفاصل رمادية داكنة

                const rawX = index.x * drawingCanvas.width; const rawY = index.y * drawingCanvas.height;

                if (smoothedX === 0 && smoothedY === 0) { smoothedX = rawX; smoothedY = rawY; } 
                else { smoothedX += (rawX - smoothedX) * smoothingFactor; smoothedY += (rawY - smoothedY) * smoothingFactor; }

                const ndcX = (index.x * 2) - 1; const ndcY = -(index.y * 2) + 1;

                if (distance < 0.08) { 
                    if (currentMode === 'drawing') {
                        if (!isDrawing) { isDrawing = true; lastX = smoothedX; lastY = smoothedY; }
                        drawCtx.beginPath(); drawCtx.moveTo(lastX, lastY); drawCtx.lineTo(smoothedX, smoothedY); drawCtx.stroke();
                        lastX = smoothedX; lastY = smoothedY;
                    } 
                    else if (currentMode === '3d') {
                        if (!heldObject) {
                            raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera3D);
                            const intersects = raycaster.intersectObjects(parts);
                            if (intersects.length > 0) { heldObject = intersects[0].object; heldObject.material.emissive.setHex(0x555555); }
                        } else {
                            heldObject.position.x += ((ndcX * 6) - heldObject.position.x) * 0.2;
                            heldObject.position.y += ((ndcY * 4) - heldObject.position.y) * 0.2;
                        }
                    }
                } else { 
                    isDrawing = false; smoothedX = rawX; smoothedY = rawY;
                    if (heldObject) { heldObject.material.emissive.setHex(0x000000); heldObject = null; }
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
