<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرسم التفاعلي في الهواء</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; /* خلفية داكنة لإبراز الألوان المضيئة */
        }
        .canvas-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            /* قلب الشاشة أفقياً لتعمل كمرآة طبيعية لحركتك */
            transform: scaleX(-1); 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        /* إخفاء عنصر الفيديو الأساسي لأننا لا نريد عرض الكاميرا العادية، بل هيكل اليد فقط */
        #videoElement { 
            display: none; 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>

    <video id="videoElement" autoplay playsinline></video>
    
    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
        <canvas id="handCanvas"></canvas>
    </div>

    <script>
        // إعداد لوحات الرسم
        const drawingCanvas = document.getElementById('drawingCanvas');
        const handCanvas = document.getElementById('handCanvas');
        const drawCtx = drawingCanvas.getContext('2d');
        const handCtx = handCanvas.getContext('2d');

        // جعل لوحات الرسم تغطي الشاشة بالكامل
        function resizeCanvas() {
            drawingCanvas.width = window.innerWidth;
            drawingCanvas.height = window.innerHeight;
            handCanvas.width = window.innerWidth;
            handCanvas.height = window.innerHeight;
            
            // إعداد شكل ولون القلم (تأثير النيون المشع)
            drawCtx.strokeStyle = '#ff00a0'; // لون زهري مضيء
            drawCtx.lineWidth = 6;
            drawCtx.lineCap = 'round';
            drawCtx.shadowBlur = 15; // قوة التوهج
            drawCtx.shadowColor = '#ff00a0'; // لون التوهج
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // إعداد مكتبة تتبع اليد
        const videoElement = document.getElementById('videoElement');
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1, // تتبع يد واحدة
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        // هذه الوظيفة تتنفذ في كل مرة تلتقط فيها الكاميرا حركتك
        // هذه الوظيفة تتنفذ في كل مرة تلتقط فيها الكاميرا حركتك
        hands.onResults((results) => {
            // مسح هيكل اليد السابق لرسم الهيكل الجديد في مكانه الجديد
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const thumb = landmarks[4]; // طرف الإبهام
                const index = landmarks[8]; // طرف السبابة
                
                // حساب المسافة بين الإبهام والسبابة
                const distance = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                // تحويل إحداثيات اليد (من 0-1) إلى أبعاد الشاشة الحقيقية
                const x = index.x * drawingCanvas.width;
                const y = index.y * drawingCanvas.height;

                // التعديل هنا: كبرنا مسافة حساسية اللمس إلى 0.1 لتعمل بسهولة أكبر
                if (distance < 0.1) {
                    // تغيير لون هيكل اليد للأخضر لتعرف فوراً أنك في وضع "الرسم"
                    drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
                    drawLandmarks(handCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});

                    if (!isDrawing) {
                        isDrawing = true;
                        lastX = x; // حفظ نقطة البداية
                        lastY = y;
                    }
                    // رسم الخط المضيء
                    drawCtx.beginPath();
                    drawCtx.moveTo(lastX, lastY);
                    drawCtx.lineTo(x, y);
                    drawCtx.stroke();
                    
                    // تحديث الإحداثيات للقطة القادمة
                    lastX = x;
                    lastY = y;
                } else {
                    // إرجاع لون هيكل اليد للسماوي عند التوقف عن الرسم (فتح الأصابع)
                    drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#00ffff', lineWidth: 4});
                    drawLandmarks(handCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});
                    
                    // إيقاف الرسم
                    isDrawing = false;
                }
            }
        });
        // تشغيل الكاميرا وإرسال الصور للذكاء الاصطناعي
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
