<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Drawing App</title>
  
  <!-- MediaPipe dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050505;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    /* Video feed as a dim mirrored background */
    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
    }

    /* Persistent canvas for drawing */
    #trailCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
    }

    /* Cleared-every-frame canvas for cursors/pointers */
    #uiCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
    }

    /* Floating UI Controls */
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.85);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 250px;
    }

    h2 {
      margin: 0 0 15px 0;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00ffcc;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #bbb;
    }

    input[type="color"] {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      padding: 10px;
      background: #222;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      color: #ffaa00;
      transition: color 0.3s ease;
    }

    .instructions {
      margin-top: 15px;
      font-size: 0.8rem;
      color: #888;
      line-height: 1.5;
    }
    
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      z-index: 20;
      color: #00ffcc;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Loading Text -->
  <div id="loading">Loading AI Models & Webcam...</div>

  <!-- Layers -->
  <video id="video" autoplay playsinline></video>
  <canvas id="trailCanvas"></canvas>
  <canvas id="uiCanvas"></canvas>

  <!-- UI Controls -->
  <div id="controls">
    <h2>Air Draw</h2>
    
    <div class="control-group">
      <label for="colorPicker">Neon Color</label>
      <input type="color" id="colorPicker" value="#00ffcc">
    </div>

    <div class="control-group">
      <label for="brushSize">Brush Thickness: <span id="sizeVal">5</span>px</label>
      <input type="range" id="brushSize" min="1" max="30" value="5">
    </div>

    <div id="status">DETECTING...</div>

    <div class="instructions">
      <strong>Gestures:</strong><br>
      ☝️ <strong>1 Finger:</strong> Draw<br>
      ✋ <strong>Open Palm:</strong> Erase All<br>
      ✊ <strong>Closed Fist:</strong> Pause
    </div>
  </div>

  <script>
    // Elements
    const video = document.getElementById('video');
    const trailCanvas = document.getElementById('trailCanvas');
    const uiCanvas = document.getElementById('uiCanvas');
    const trailCtx = trailCanvas.getContext('2d', { willReadFrequently: true });
    const uiCtx = uiCanvas.getContext('2d');
    
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const sizeVal = document.getElementById('sizeVal');
    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');

    // UI Listeners
    brushSize.addEventListener('input', (e) => sizeVal.textContent = e.target.value);

    // Resize Canvases
    function resize() {
      trailCanvas.width = window.innerWidth;
      trailCanvas.height = window.innerHeight;
      uiCanvas.width = window.innerWidth;
      uiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // State Variables
    let lastX = null;
    let lastY = null;

    // MediaPipe Hands Setup
    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    // Start Camera
    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
      },
      width: 1280,
      height: 720
    });
    
    camera.start().then(() => {
      loadingEl.style.display = 'none';
    });

    // Helper: Determine if a finger is extended based on landmark Y values
    // Canvas Y grows downwards. So tip < pip means finger is pointing UP.
    function isFingerUp(landmarks, tipIndex, pipIndex) {
      return landmarks[tipIndex].y < landmarks[pipIndex].y;
    }

    function onResults(results) {
      // Clear UI canvas every frame for cursors
      uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        // 1. Check Finger States
        const indexUp  = isFingerUp(landmarks, 8, 6);
        const middleUp = isFingerUp(landmarks, 12, 10);
        const ringUp   = isFingerUp(landmarks, 16, 14);
        const pinkyUp  = isFingerUp(landmarks, 20, 18);

        // 2. Define Gestures
        const isDraw  = indexUp && !middleUp && !ringUp && !pinkyUp;
        const isErase = indexUp && middleUp && ringUp && pinkyUp;
        const isPause = !indexUp && !middleUp && !ringUp && !pinkyUp;

        // 3. Map Index Tip to Canvas (Mirror X coordinate)
        const currentX = (1 - landmarks[8].x) * trailCanvas.width;
        const currentY = landmarks[8].y * trailCanvas.height;

        // Draw an indicator cursor on the UI canvas
        uiCtx.beginPath();
        uiCtx.arc(currentX, currentY, 8, 0, 2 * Math.PI);
        uiCtx.fillStyle = isDraw ? colorPicker.value : (isErase ? '#ff0000' : '#888');
        uiCtx.fill();

        // 4. Handle Logic
        if (isErase) {
          statusEl.textContent = "ERASING";
          statusEl.style.color = "#ff4444";
          trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
          lastX = null;
          lastY = null;
        } 
        else if (isDraw) {
          statusEl.textContent = "DRAWING";
          statusEl.style.color = "#00ffcc";
          
          if (lastX !== null && lastY !== null) {
            drawNeonLine(lastX, lastY, currentX, currentY);
          }
          lastX = currentX;
          lastY = currentY;
        } 
        else if (isPause) {
          statusEl.textContent = "PAUSED";
          statusEl.style.color = "#aaaaaa";
          lastX = null;
          lastY = null;
        } 
        else {
          statusEl.textContent = "HOVERING";
          statusEl.style.color = "#ffffff";
          lastX = null;
          lastY = null;
        }
      } else {
        statusEl.textContent = "NO HAND DETECTED";
        statusEl.style.color = "#666";
        lastX = null;
        lastY = null;
      }
    }

    function drawNeonLine(x1, y1, x2, y2) {
      const color = colorPicker.value;
      const size = parseInt(brushSize.value);

      trailCtx.beginPath();
      trailCtx.moveTo(x1, y1);
      trailCtx.lineTo(x2, y2);
      
      // Neon Styles
      trailCtx.strokeStyle = color;
      trailCtx.lineWidth = size;
      trailCtx.lineCap = 'round';
      trailCtx.lineJoin = 'round';
      trailCtx.shadowBlur = size * 3; // Glow radius relative to thickness
      trailCtx.shadowColor = color;
      
      trailCtx.stroke();
    }
  </script>
</body>
</html>
